                { name: "Mendoza", w: 4.0, b: 0.4, h: 94.1, a: 0.9 },
                { name: "Ruiz", w: 5.0, b: 0.5, h: 93.3, a: 0.5 },
                { name: "Hughes", w: 77.5, b: 17.5, h: 2.2, a: 0.5 },
                { name: "Price", w: 74.4, b: 20.6, h: 2.2, a: 0.5 },
                { name: "Alvarez", w: 5.1, b: 0.5, h: 93.2, a: 0.6 },
                { name: "Castillo", w: 5.0, b: 0.5, h: 93.1, a: 0.8 },
                { name: "Sanders", w: 64.3, b: 30.6, h: 2.2, a: 0.4 },
                { name: "Patel", w: 1.8, b: 0.5, h: 0.7, a: 95.1 },
                { name: "Myers", w: 84.3, b: 11.2, h: 2.0, a: 0.5 },
                { name: "Long", w: 76.5, b: 16.9, h: 2.2, a: 1.6 },
                { name: "Ross", w: 71.4, b: 23.3, h: 2.4, a: 0.6 },
                { name: "Foster", w: 68.6, b: 26.2, h: 2.2, a: 0.5 },
                { name: "Jimenez", w: 4.0, b: 0.4, h: 94.6, a: 0.5 },
            ];

            const DEFAULT_DATASETS = [
                {
                    id: "ssa-common-given",
                    label: "🇺🇸 SSA Common Given Names",
                    type: "Official",
                    source: "Social Security Administration",
                    years: "1925-2024 · Top 100 M/F",
                    range: "",
                    items: GIVEN_NAMES_100,
                    href: "https://www.ssa.gov/oact/babynames/decades/century.html",
                },
                {
                    id: "census-common-surnames",
                    label: "🇺🇸 Census Common Surnames",
                    type: "Official",
                    source: "U.S. Census Bureau",
                    years: "2010 · Top 100 Surnames w/ Demographics",
                    range: "",
                    items: CENSUS_100_SURNAMES,
                    href: "https://www.census.gov/topics/population/genealogy/data/2010_surnames.html",
                },
                {
                    id: "generated-number-slot",
                    label: "🔢 Random Number Generator",
                    type: "",
                    source: "Local Generator",
                    years: "",
                    range: "",
                    items: [],
                    href: "",
                },
            ];

            const state = {
                datasets: DEFAULT_DATASETS.map((dataset) => ({
                    ...dataset,
                    items: [...dataset.items],
                })),
                slots: [],
                tokens: [],
                nameFormula: "1+2",
                usernameFormula: "1+2+3",
                separator: "",
                casing: "camel",
                pendingFormulaSlotNumber: null,
                lastNameResult: "",
            };

            const byId = (id) => document.getElementById(id);

            const randomId = (prefix) =>
                `${prefix}-${Math.random().toString(36).slice(2, 10)}`;

            const makeColor = (index) => {
                const hue = (BASE_HUE + index * 137.508) % 360;
                const sat = 70 + ((index * 7) % 20);
                const light = 65 + ((index * 5) % 10);
                return `hsl(${hue.toFixed(1)} ${sat}% ${light}%)`;
            };

            const makeSlot = (datasetId = "", index = 0) => ({
                id: randomId("slot"),
                datasetId,
                color: makeColor(index),
                range: 20,
                numberLength: 1,
                genderFilter: ["M", "F"],
                raceFilter: ["w", "b", "h", "a"],
            });

            const getDatasetById = (id) =>
                state.datasets.find((dataset) => dataset.id === id) || null;
            const normalizeLineBreaks = (text) =>
                String(text || "").replace(/\r\n?/g, NL);

            function parseDatasetText(text, fallbackName, sizeBytes) {
                const items = normalizeLineBreaks(text)
                    .split(NL)
                    .map((line) => line.trim())
                    .filter(Boolean);
                const sizeStr = sizeBytes ? ` · ${formatBytes(sizeBytes)}` : "";
                return {
                    id: randomId("dataset"),
                    label: `📄 ${fallbackName || "Dataset"}`,
                    type: "Imported",
                    source: "Local file",
                    years: "",
                    range: `${items.length} items${sizeStr}`,
                    items,
                    href: "",
                };
            }

            const readFileAsText = (file) =>
                new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(String(reader.result || ""));
                    reader.onerror = () =>
                        reject(new Error("Failed to read file"));
                    reader.readAsText(file);
                });

            const createOption = (value, text) => {
                const option = document.createElement("option");
                option.value = value;
                option.textContent = text;
                return option;
            };

            function fillDatasetOptions(select, selectedId) {
                select.innerHTML = "";
                const placeholder = createOption("", "Select or import...");
                placeholder.disabled = true;
                placeholder.selected = true;
                placeholder.hidden = true;
                select.appendChild(placeholder);

                state.datasets.forEach((dataset) =>
                    select.appendChild(createOption(dataset.id, dataset.label)),
                );
                if (selectedId) select.value = selectedId;
            }

            const pickRandom = (items) => {
                if (!items || !items.length) return "";
                return items[Math.floor(Math.random() * items.length)];
            };

            const onlyAsciiAlphaNum = (value) =>
                String(value || "").replace(/[^a-zA-Z0-9]/g, "");
            const capitalize = (value) =>
                value
                    ? value.charAt(0).toUpperCase() +
                      value.slice(1).toLowerCase()
                    : "";
            const generateNumberString = (len) =>
                len < 1
                    ? ""
                    : String(Math.floor(Math.random() * 9) + 1) +
                      Array.from({ length: len - 1 }, () =>
                          Math.floor(Math.random() * 10),
                      ).join("");

            // Combinatorics Engine for enabling/disabling Generate buttons dynamically
            function getSlotComboCount(slot) {
                if (!slot) return 1;
                const dataset = getDatasetById(slot.datasetId);
                if (!dataset) return 1;

                if (dataset.id === "generated-number-slot") {
                    return slot.numberLength === 1
                        ? 9
                        : 9 * Math.pow(10, slot.numberLength - 1);
                } else if (dataset.id === "census-common-surnames") {
                    const filter = slot.raceFilter || ["w", "b", "h", "a"];
                    return dataset.items
                        .slice(0, slot.range || 20)
                        .filter((i) => {
                            const max = Math.max(i.w, i.b, i.h, i.a);
                            if (max === i.w && filter.includes("w"))
                                return true;
                            if (max === i.b && filter.includes("b"))
                                return true;
                            if (max === i.h && filter.includes("h"))
                                return true;
                            if (max === i.a && filter.includes("a"))
                                return true;
                            return false;
                        }).length;
                } else if (dataset.id === "ssa-common-given") {
                    const filter = slot.genderFilter || ["M", "F"];
                    return dataset.items.filter(
                        (i) =>
                            i.rank <= (slot.range || 20) &&
                            filter.includes(i.g),
                    ).length;
                } else {
                    return dataset.items.length;
                }
            }

            function getFormulaCombinations(formula) {
                const segs = getFormulaSegments(
                    formula,
                    state.slots.length,
                ).filter((s) =>
                    isStandaloneSlotReference(s, state.slots.length),
                );
                if (segs.length === 0) return 1;
                let total = 1;
                // Count slots per usage. If formula is 1+1, it's evaluated independently, so multiply slot combos
                segs.forEach((seg) => {
                    total *= getSlotComboCount(state.slots[Number(seg) - 1]);
                });
                return total;
            }

            function checkButtonsState() {
                const nameCombos = getFormulaCombinations(state.nameFormula);
                byId("generateBtn").disabled = nameCombos <= 1;

                const nameSegs = getFormulaSegments(
                    state.nameFormula,
                    state.slots.length,
                ).filter((s) =>
                    isStandaloneSlotReference(s, state.slots.length),
                );
                const userSegs = getFormulaSegments(
                    state.usernameFormula,
                    state.slots.length,
                ).filter((s) =>
                    isStandaloneSlotReference(s, state.slots.length),
                );
                const exclusiveSegs = userSegs.filter(
                    (s) => !nameSegs.includes(s),
                );

                let userCombos = 1;
                if (exclusiveSegs.length > 0) {
                    exclusiveSegs.forEach((seg) => {
                        userCombos *= getSlotComboCount(
                            state.slots[Number(seg) - 1],
                        );
                    });
                } else {
                    userSegs.forEach((seg) => {
                        userCombos *= getSlotComboCount(
                            state.slots[Number(seg) - 1],
                        );
                    });
                }

                const btn = byId("refreshUsernameBtn");
                if (userCombos <= 1) {
                    btn.style.opacity = "0";
                    btn.style.pointerEvents = "none";
                } else {
                    btn.style.opacity = "1";
                    btn.style.pointerEvents = "auto";
                }
            }

            function computeSingleToken(slot) {
                const dataset = getDatasetById(slot.datasetId);
                if (!dataset) return null;

                let text = "";
                let demographics = null;
                let gender = null;

                if (dataset.id === "generated-number-slot") {
                    text = generateNumberString(slot.numberLength || 1);
                } else if (dataset.id === "census-common-surnames") {
                    const filter = slot.raceFilter || ["w", "b", "h", "a"];
                    const filteredItems = dataset.items
                        .slice(0, slot.range || 20)
                        .filter((i) => {
                            const max = Math.max(i.w, i.b, i.h, i.a);
                            if (max === i.w && filter.includes("w"))
                                return true;
                            if (max === i.b && filter.includes("b"))
                                return true;
                            if (max === i.h && filter.includes("h"))
                                return true;
                            if (max === i.a && filter.includes("a"))
                                return true;
                            return false;
                        });
                    const picked = pickRandom(filteredItems);
                    if (picked) {
                        text = picked.name;
                        demographics = picked;
                    }
                } else if (dataset.id === "ssa-common-given") {
                    const filter = slot.genderFilter || ["M", "F"];
                    const pool = dataset.items.filter(
                        (i) =>
                            i.rank <= (slot.range || 20) &&
                            filter.includes(i.g),
                    );
                    const picked = pickRandom(pool);
                    if (picked) {
                        text = picked.name;
                        gender = picked.g;
                    }
                } else {
                    text = pickRandom(dataset.items);
                }

                return text
                    ? {
                          slotId: slot.id,
                          text,
                          color: slot.color,
                          demographics,
                          gender,
                      }
                    : null;
            }

            function computeTokens() {
                return state.slots.map((slot) => computeSingleToken(slot));
            }

            function recomputeSlot(slotId) {
                const index = state.slots.findIndex((s) => s.id === slotId);
                if (index > -1) {
                    state.tokens[index] = computeSingleToken(
                        state.slots[index],
                    );
                    renderPreview();
                }
            }

            const getFormulaSegments = (formulaText, slotCount) => {
                const segments = String(formulaText || "")
                    .split("+")
                    .map((p) => p.trim())
                    .filter(Boolean);
                return segments.length
                    ? segments
                    : Array.from({ length: slotCount }, (_, i) =>
                          String(i + 1),
                      );
            };

            const isStandaloneSlotReference = (segment, slotCount) => {
                if (!/^\d+$/.test(segment)) return false;
                const num = Number(segment);
                return num >= 1 && num <= slotCount;
            };

            const applyCase = (text) =>
                state.casing === "lower"
                    ? text.toLowerCase()
                    : state.casing === "keep"
                      ? text
                      : capitalize(text);

            function buildFormulaParts(
                tokens,
                formulaText,
                joiner,
                applyLetterCase,
            ) {
                const segments = getFormulaSegments(
                    formulaText,
                    state.slots.length,
                );
                const parts = [];

                segments.forEach((segment, index) => {
                    let value = segment,
                        color = "";
                    if (
                        isStandaloneSlotReference(segment, state.slots.length)
                    ) {
                        const token = tokens[Number(segment) - 1];
                        if (token?.text) {
                            value = applyLetterCase
                                ? applyCase(onlyAsciiAlphaNum(token.text)) ||
                                  segment
                                : token.text;
                            color =
                                applyLetterCase &&
                                !onlyAsciiAlphaNum(token.text)
                                    ? ""
                                    : token.color;
                        }
                    }
                    if (index > 0 && joiner)
                        parts.push({ text: joiner, color: "", joiner: true });
                    parts.push({ text: value, color, joiner: false });
                });

                return parts;
            }

            const partsToText = (parts, limit = 9999) =>
                parts
                    .map((p) => p.text)
                    .join("")
                    .slice(0, limit);

            function renderColoredText(node, parts, className) {
                node.innerHTML = "";
                parts.forEach((part) => {
                    const span = document.createElement("span");
                    span.className = `${className} ${part.joiner ? "joiner" : "segment"}`;
                    span.textContent = part.text;
                    if (part.color) span.style.color = part.color;
                    node.appendChild(span);
                });
            }

            function generateSmartEmoji(tokens) {
                let gender = null;
                let demographics = null;
                tokens.forEach((t) => {
                    if (t && t.gender) gender = t.gender;
                    if (t && t.demographics) demographics = t.demographics;
                });
                let base = "\u{1F9D1}";
                if (gender === "M") base = "\u{1F468}";
                else if (gender === "F") base = "\u{1F469}";

                if (demographics) {
                    const { w, b, h, a } = demographics;
                    const max = Math.max(w, b, h, a);
                    if (max === w) return base + "\u{1F3FC}";
                    else if (max === a) return base + "\u{1F3FB}";
                    else if (max === h) return base + "\u{1F3FD}";
                    else if (max === b) return base + "\u{1F3FF}";
                }
                return base;
            }

            function renderDemographics(tokens) {
                const demoBox = byId("demographicsBox");
                demoBox.innerHTML = "";
                const tokensWithDemo = tokens.filter(
                    (t) => t && t.demographics,
                );
                if (!tokensWithDemo.length) return;

                tokensWithDemo.forEach((t) => {
                    const d = t.demographics;
                    const stats = [];
                    if (d.w > 0) stats.push({ label: "White", val: d.w });
                    if (d.b > 0) stats.push({ label: "Black", val: d.b });
                    if (d.h > 0) stats.push({ label: "Hispanic", val: d.h });
                    if (d.a > 0) stats.push({ label: "Asian", val: d.a });
                    stats.sort((a, b) => b.val - a.val);

                    const container = document.createElement("div");
                    container.style.display = "flex";
                    container.style.flexDirection = "column";
                    container.style.gap = "4px";
                    const title = document.createElement("div");
                    title.style.fontSize = "11px";
                    title.style.fontWeight = "700";
                    title.style.color = t.color;
                    title.style.marginBottom = "2px";
                    title.style.textTransform = "uppercase";
                    title.style.letterSpacing = "0.05em";
                    title.textContent = "SURNAME STATS";
                    container.appendChild(title);

                    stats.forEach((s, idx) => {
                        const div = document.createElement("div");
                        div.className = "demo-item";
                        div.style.opacity = String(1 - idx * 0.25);
                        div.innerHTML = `<strong>${s.val}%</strong> ${s.label}`;
                        container.appendChild(div);
                    });
                    demoBox.appendChild(container);
                });
            }

            function renderPreview() {
                const nameNode = byId("resultName");
                const usernameNode = byId("resultUsername");
                const nameParts = buildFormulaParts(
                    state.tokens,
                    state.nameFormula,
                    " ",
                    false,
                );
                const usernameParts = buildFormulaParts(
                    state.tokens,
                    state.usernameFormula,
                    state.separator,
                    true,
                );

                renderColoredText(nameNode, nameParts, "name-piece");
                renderColoredText(
                    usernameNode,
                    usernameParts,
                    "username-piece",
                );

                byId("resultEmoji").textContent = generateSmartEmoji(
                    state.tokens,
                );
                renderDemographics(state.tokens);

                nameNode.dataset.copy = partsToText(nameParts, 120);
                usernameNode.dataset.copy = partsToText(usernameParts, 4000);
                checkButtonsState();
            }

            function generate() {
                const combos = getFormulaCombinations(state.nameFormula);
                if (combos <= 1) {
                    state.tokens = computeTokens();
                    state.lastNameResult = partsToText(
                        buildFormulaParts(
                            state.tokens,
                            state.nameFormula,
                            " ",
                            false,
                        ),
                    );
                } else {
                    let attempts = 0;
                    let candidateTokens;
                    let candidateName;
                    do {
                        candidateTokens = computeTokens();
                        candidateName = partsToText(
                            buildFormulaParts(
                                candidateTokens,
                                state.nameFormula,
                                " ",
                                false,
                            ),
                        );
                        attempts++;
                    } while (
                        candidateName === state.lastNameResult &&
                        attempts < 50
                    );
                    state.tokens = candidateTokens;
                    state.lastNameResult = candidateName;
                }
                renderPreview();
            }

            function addSlot(datasetId) {
                state.slots.push(makeSlot(datasetId, state.slots.length));
                renderSlots();
                generate();
                setTimeout(() => {
                    const slotContainers =
                        document.querySelectorAll(".slot-container");
                    if (slotContainers.length > 0) {
                        const newSlotContainer =
                            slotContainers[slotContainers.length - 1];
                        const importBtn = newSlotContainer.querySelector(
                            '[data-action="import"]',
                        );
                        if (importBtn) {
                            importBtn.classList.remove("btn-glow-anim");
                            void importBtn.offsetWidth;
                            importBtn.classList.add("btn-glow-anim");
                        }
                    }
                }, 10);
            }

            const adjustFormulaAfterRemoval = (formula, removedIdx) =>
                String(formula || "")
                    .split("+")
                    .map((s) => s.trim())
                    .filter(Boolean)
                    .reduce((acc, seg) => {
                        if (!/^\d+$/.test(seg)) {
                            acc.push(seg);
                            return acc;
                        }
                        const num = parseInt(seg, 10);
                        if (num === removedIdx + 1) return acc;
                        acc.push(String(num > removedIdx + 1 ? num - 1 : num));
                        return acc;
                    }, [])
                    .join("+");

            function removeSlot(slotId) {
                if (state.slots.length <= 1) return;
                const removedIndex = state.slots.findIndex(
                    (s) => s.id === slotId,
                );
                if (removedIndex < 0) return;

                state.slots.splice(removedIndex, 1);
                state.nameFormula = adjustFormulaAfterRemoval(
                    state.nameFormula,
                    removedIndex,
                );
                state.usernameFormula = adjustFormulaAfterRemoval(
                    state.usernameFormula,
                    removedIndex,
                );

                byId("nameFormulaInput").value = state.nameFormula;
                byId("usernameFormulaInput").value = state.usernameFormula;

                renderSlots();
                generate();
            }

            function moveSlot(slotId, step) {
                const index = state.slots.findIndex((s) => s.id === slotId);
                const nextIndex = index + step;
                if (
                    index < 0 ||
                    nextIndex < 0 ||
                    nextIndex >= state.slots.length
                )
                    return;
                [state.slots[index], state.slots[nextIndex]] = [
                    state.slots[nextIndex],
                    state.slots[index],
                ];
                renderSlots();
                generate();
            }

            function showInlineCheck(kind) {
                const isName = kind === "name";
                const node = byId(isName ? "nameCheck" : "usernameCheck");
                const timerKey = isName
                    ? "nameCheckTimer"
                    : "usernameCheckTimer";
                node.classList.add("visible");
                clearTimeout(state[timerKey]);
                state[timerKey] = setTimeout(
                    () => node.classList.remove("visible"),
                    700,
                );
            }

            async function copyText(text, kind) {
                if (!text) return;
                try {
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(text);
                        showInlineCheck(kind);
                        return;
                    }
                    throw new Error("Clipboard API strictly unavailable.");
                } catch (err) {
                    const area = document.createElement("textarea");
                    area.value = text;
                    area.style.cssText = "position:fixed;left:-9999px;top:0;";
                    document.body.appendChild(area);
                    area.select();
                    try {
                        document.execCommand("copy");
                        showInlineCheck(kind);
                    } catch (e) {
                        window.prompt("Copy to clipboard:", text);
                    }
                    document.body.removeChild(area);
                }
            }

            function showFormulaAddOptions(slotNumber) {
                state.pendingFormulaSlotNumber = slotNumber;
                ["nameFormulaAdd", "usernameFormulaAdd"].forEach((id) => {
                    const btn = byId(id);
                    btn.hidden = false;
                    btn.title = `Add +${slotNumber} to formula`;
                });
            }

            function clearFormulaAddOptions() {
                state.pendingFormulaSlotNumber = null;
                byId("nameFormulaAdd").hidden = true;
                byId("usernameFormulaAdd").hidden = true;
            }

            function appendPendingSlotToFormula(kind) {
                if (!state.pendingFormulaSlotNumber) return;
                const input = byId(
                    kind === "name"
                        ? "nameFormulaInput"
                        : "usernameFormulaInput",
                );
                const current = input.value.trim();
                input.value = current
                    ? `${current}+${state.pendingFormulaSlotNumber}`
                    : String(state.pendingFormulaSlotNumber);
                if (kind === "name") state.nameFormula = input.value;
                else state.usernameFormula = input.value;
                clearFormulaAddOptions();
                renderPreview();
            }

            function openDatasetModal(datasetId) {
                const dataset = getDatasetById(datasetId);
                if (!dataset) return;

                byId("modalTitle").textContent = dataset.label.replace(
                    /^.+?\s/,
                    "",
                ); // Remove emoji for title

                const thead = byId("modalTableHead");
                const tbody = byId("modalTableBody");
                thead.innerHTML = "";
                tbody.innerHTML = "";

                if (dataset.id === "ssa-common-given") {
                    thead.innerHTML = `<tr><th style="width:60px">#</th><th>Name</th><th style="width:80px">Gender</th></tr>`;
                    dataset.items.forEach((item, i) => {
                        tbody.innerHTML += `<tr><td>${item.rank}</td><td><strong>${item.name}</strong></td><td>${item.g}</td></tr>`;
                    });
                } else if (dataset.id === "census-common-surnames") {
                    thead.innerHTML = `<tr><th style="width:60px">#</th><th>Surname</th><th>W %</th><th>B %</th><th>H %</th><th>A %</th></tr>`;
                    dataset.items.forEach((item, i) => {
                        tbody.innerHTML += `<tr><td>${i + 1}</td><td><strong>${item.name}</strong></td><td>${item.w}</td><td>${item.b}</td><td>${item.h}</td><td>${item.a}</td></tr>`;
                    });
                } else {
                    thead.innerHTML = `<tr><th style="width:60px">#</th><th>Item</th></tr>`;
                    dataset.items.forEach((item, i) => {
                        tbody.innerHTML += `<tr><td>${i + 1}</td><td><strong>${item}</strong></td></tr>`;
                    });
                }

                const footer = byId("modalFooter");
                footer.innerHTML = "";
                if (dataset.href) {
                    footer.innerHTML = `<span>Source: ${dataset.source}</span> <a href="${dataset.href}" target="_blank" rel="noopener noreferrer">View Original Data &rarr;</a>`;
                } else {
                    footer.innerHTML = `<span>${dataset.source || "Custom Data"}</span>`;
                }

                byId("datasetModal").classList.add("active");
            }

            byId("modalClose").addEventListener("click", () =>
                byId("datasetModal").classList.remove("active"),
            );
            byId("datasetModal").addEventListener("click", (e) => {
                if (e.target === byId("datasetModal"))
                    byId("datasetModal").classList.remove("active");
            });

            function renderDatasetInfo() {
                const root = byId("datasetInfo");
                root.innerHTML = "";
                state.datasets.forEach((dataset) => {
                    const li = document.createElement("li");
                    li.className = "dataset-item";

                    const nameDiv = document.createElement("div");
                    nameDiv.className = "dataset-name";
                    if (
                        dataset.items &&
                        dataset.items.length > 0 &&
                        dataset.id !== "generated-number-slot"
                    ) {
                        const btn = document.createElement("button");
                        btn.className = "dataset-title-btn";
                        btn.textContent = dataset.label;
                        btn.onclick = () => openDatasetModal(dataset.id);
                        nameDiv.appendChild(btn);
                    } else {
                        nameDiv.textContent = dataset.label;
                    }
                    li.appendChild(nameDiv);

                    if (dataset.type || dataset.source) {
                        const meta1 = document.createElement("div");
                        meta1.className = "dataset-meta";
                        meta1.textContent = [dataset.type, dataset.source]
                            .filter(Boolean)
                            .join(" · ");
                        li.appendChild(meta1);
                    }
                    if (dataset.years || dataset.range) {
                        const meta2 = document.createElement("div");
                        meta2.className = "dataset-meta";
                        meta2.textContent = [dataset.years, dataset.range]
                            .filter(Boolean)
                            .join(" · ");
                        li.appendChild(meta2);
                    }
                    root.appendChild(li);
                });
            }

            function bindSlotEvents(slot, row, index) {
                const datasetSelect = row.querySelector(
                    '[data-part="dataset"]',
                );
                const upBtn = row.querySelector('[data-action="up"]');
                const downBtn = row.querySelector('[data-action="down"]');
                const importBtn = row.querySelector('[data-action="import"]');
                const removeBtn = row.querySelector('[data-action="remove"]');
                const fileInput = row.querySelector('[data-part="file"]');
                const settingsDiv = row.querySelector('[data-part="settings"]');

                datasetSelect.addEventListener("change", () => {
                    slot.datasetId = datasetSelect.value;
                    renderSlots();
                    generate();
                    if (slot.datasetId)
                        showFormulaAddOptions(
                            state.slots.findIndex((s) => s.id === slot.id) + 1,
                        );
                });

                upBtn.disabled = index === 0;
                downBtn.disabled = index === state.slots.length - 1;
                removeBtn.disabled = state.slots.length <= 1;

                upBtn.addEventListener("click", () => moveSlot(slot.id, -1));
                downBtn.addEventListener("click", () => moveSlot(slot.id, 1));
                importBtn.addEventListener("click", () => fileInput.click());
                removeBtn.addEventListener("click", () => removeSlot(slot.id));

                fileInput.addEventListener("change", async () => {
                    const file = fileInput.files?.[0];
                    if (!file) return;
                    try {
                        const text = await readFileAsText(file);
                        const dataset = parseDatasetText(
                            text,
                            file.name,
                            file.size,
                        );
                        if (!dataset.items.length) return;

                        state.datasets.push(dataset);
                        slot.datasetId = dataset.id;
                        renderDatasetInfo();
                        renderSlots();
                        generate();

                        showFormulaAddOptions(
                            state.slots.findIndex((s) => s.id === slot.id) + 1,
                        );

                        const advancedPanel =
                            document.querySelector("aside.side");
                        if (advancedPanel)
                            advancedPanel.scrollIntoView({
                                behavior: "smooth",
                                block: "start",
                            });

                        ["nameFormulaAdd", "usernameFormulaAdd"].forEach(
                            (id) => {
                                const btn = byId(id);
                                if (!btn.hidden) {
                                    btn.classList.remove("btn-glow-anim");
                                    void btn.offsetWidth;
                                    btn.classList.add("btn-glow-anim");
                                }
                            },
                        );
                        ["nameFormulaInput", "usernameFormulaInput"].forEach(
                            (id) => {
                                const input = byId(id);
                                input.classList.remove("input-glow-anim");
                                void input.offsetWidth;
                                input.classList.add("input-glow-anim");
                            },
                        );
                    } catch (error) {
                        console.error("File import failed:", error);
                    }
                });

                if (
                    slot.datasetId === "census-common-surnames" ||
                    slot.datasetId === "ssa-common-given"
                ) {
                    const rangeInput = settingsDiv.querySelector(
                        '[data-action="range"]',
                    );
                    rangeInput.addEventListener("input", (e) => {
                        let val = parseInt(e.target.value, 10);
                        if (!isNaN(val)) {
                            slot.range = Math.max(1, Math.min(100, val));
                            renderSlots(); // Re-render to update checkbox dimming instantly
                            recomputeSlot(slot.id);
                        }
                    });
                    rangeInput.addEventListener("blur", (e) => {
                        e.target.value = slot.range || 20;
                    });

                    if (slot.datasetId === "ssa-common-given") {
                        const genderBoxes = settingsDiv.querySelectorAll(
                            '[data-action="gender"]',
                        );
                        genderBoxes.forEach((cb) => {
                            cb.addEventListener("change", (e) => {
                                const val = e.target.value;
                                const otherVal = val === "M" ? "F" : "M";
                                const otherCb = settingsDiv.querySelector(
                                    `[value="${otherVal}"]`,
                                );

                                if (!e.target.checked && !otherCb.checked) {
                                    e.target.checked = true; // Prevent unchecking last option
                                    return; // Early return to avoid recompute
                                }

                                slot.genderFilter = [];
                                if (
                                    settingsDiv.querySelector('[value="M"]')
                                        .checked
                                )
                                    slot.genderFilter.push("M");
                                if (
                                    settingsDiv.querySelector('[value="F"]')
                                        .checked
                                )
                                    slot.genderFilter.push("F");
                                renderSlots();
                                recomputeSlot(slot.id);
                            });
                        });
                    }

                    if (slot.datasetId === "census-common-surnames") {
                        const raceBoxes = settingsDiv.querySelectorAll(
                            '[data-action="race"]',
                        );
                        raceBoxes.forEach((cb) => {
                            cb.addEventListener("change", (e) => {
                                const checkedBoxes =
                                    settingsDiv.querySelectorAll(
                                        '[data-action="race"]:checked',
                                    );
                                if (checkedBoxes.length === 0) {
                                    e.target.checked = true;
                                    return; // Early return to avoid recompute
                                }
                                slot.raceFilter = Array.from(
                                    settingsDiv.querySelectorAll(
                                        '[data-action="race"]:checked',
                                    ),
                                ).map((b) => b.value);
                                renderSlots();
                                recomputeSlot(slot.id);
                            });
                        });
                    }
                } else if (slot.datasetId === "generated-number-slot") {
                    const lenInput = settingsDiv.querySelector(
                        '[data-action="num-len"]',
                    );
                    lenInput.addEventListener("input", (e) => {
                        let val = parseInt(e.target.value, 10);
                        if (!isNaN(val)) {
                            slot.numberLength = Math.max(1, val);
                            recomputeSlot(slot.id);
                        }
                    });
                    lenInput.addEventListener("blur", (e) => {
                        e.target.value = slot.numberLength || 1;
                    });
                }
            }

            function renderSlots() {
                const root = byId("slots");
                root.innerHTML = "";

                state.slots.forEach((slot, index) => {
                    const fragment =
                        byId("slotTemplate").content.cloneNode(true);
                    const row = fragment.querySelector(".slot-container");

                    const indexBox = row.querySelector('[data-part="index"]');
                    indexBox.textContent = String(index + 1);
                    indexBox.style.backgroundColor = slot.color;
                    indexBox.style.color = "#090a0c";
                    indexBox.style.borderColor = slot.color;

                    fillDatasetOptions(
                        row.querySelector('[data-part="dataset"]'),
                        slot.datasetId,
                    );

                    const settingsDiv = row.querySelector(
                        '[data-part="settings"]',
                    );

                    if (slot.datasetId === "ssa-common-given") {
                        settingsDiv.hidden = false;
                        const filter = slot.genderFilter || ["M", "F"];
                        const range = slot.range || 20;
                        const dataset = getDatasetById("ssa-common-given");
                        const pool = dataset.items.filter(
                            (i) => i.rank <= range,
                        );

                        const hasM = pool.some((i) => i.g === "M");
                        const hasF = pool.some((i) => i.g === "F");

                        settingsDiv.innerHTML = `
                            <div class="setting-row">
                                <label>Top</label>
                                <input type="number" min="1" max="100" value="${range}" data-action="range" title="Limit between 1 and 100">
                                <div class="inline-toggles">
                                    <label class="toggle-label ${!hasM ? "is-empty" : !filter.includes("M") ? "is-unchecked" : ""}">
                                        <input type="checkbox" value="M" data-action="gender" ${filter.includes("M") ? "checked" : ""}> Male
                                    </label>
                                    <label class="toggle-label ${!hasF ? "is-empty" : !filter.includes("F") ? "is-unchecked" : ""}">
                                        <input type="checkbox" value="F" data-action="gender" ${filter.includes("F") ? "checked" : ""}> Female
                                    </label>
                                </div>
                            </div>
                        `;
                    } else if (slot.datasetId === "census-common-surnames") {
                        settingsDiv.hidden = false;
                        const filter = slot.raceFilter || ["w", "b", "h", "a"];
                        const range = slot.range || 20;
                        const dataset = getDatasetById(
                            "census-common-surnames",
                        );
                        const pool = dataset.items.slice(0, range);

                        const hasW = pool.some(
                            (i) => Math.max(i.w, i.b, i.h, i.a) === i.w,
                        );
                        const hasB = pool.some(
                            (i) => Math.max(i.w, i.b, i.h, i.a) === i.b,
                        );
                        const hasH = pool.some(
                            (i) => Math.max(i.w, i.b, i.h, i.a) === i.h,
                        );
                        const hasA = pool.some(
                            (i) => Math.max(i.w, i.b, i.h, i.a) === i.a,
                        );

                        settingsDiv.innerHTML = `
                            <div class="setting-row">
                                <label>Top</label>
                                <input type="number" min="1" max="100" value="${range}" data-action="range" title="Limit between 1 and 100">
                                <div class="inline-toggles">
                                    <label class="toggle-label ${!hasW ? "is-empty" : !filter.includes("w") ? "is-unchecked" : ""}" title="White">
                                        <input type="checkbox" value="w" data-action="race" ${filter.includes("w") ? "checked" : ""}> White
                                    </label>
                                    <label class="toggle-label ${!hasB ? "is-empty" : !filter.includes("b") ? "is-unchecked" : ""}" title="Black">
                                        <input type="checkbox" value="b" data-action="race" ${filter.includes("b") ? "checked" : ""}> Black
                                    </label>
                                    <label class="toggle-label ${!hasH ? "is-empty" : !filter.includes("h") ? "is-unchecked" : ""}" title="Hispanic">
                                        <input type="checkbox" value="h" data-action="race" ${filter.includes("h") ? "checked" : ""}> Hispanic
                                    </label>
                                    <label class="toggle-label ${!hasA ? "is-empty" : !filter.includes("a") ? "is-unchecked" : ""}" title="Asian">
                                        <input type="checkbox" value="a" data-action="race" ${filter.includes("a") ? "checked" : ""}> Asian
                                    </label>
                                </div>
                            </div>
                        `;
                    } else if (slot.datasetId === "generated-number-slot") {
                        settingsDiv.hidden = false;
                        settingsDiv.innerHTML = `
                            <div class="setting-row">
                                <label>Number length:</label>
                                <input type="number" min="1" max="15" value="${slot.numberLength || 1}" data-action="num-len" title="Set the digits count">
                            </div>
                        `;
                    } else {
                        settingsDiv.hidden = true;
                    }

                    bindSlotEvents(slot, row, index);
                    root.appendChild(fragment);
                });
            }

            function bindAdvanced() {
                const bindInput = (id, stateKey, callback) => {
                    byId(id).addEventListener("input", (e) => {
                        state[stateKey] = e.target.value;
                        callback();
                    });
                };

                bindInput("nameFormulaInput", "nameFormula", renderPreview);
                bindInput(
                    "usernameFormulaInput",
                    "usernameFormula",
                    renderPreview,
                );
                bindInput("separatorInput", "separator", renderPreview);

                byId("caseSelect").addEventListener("change", (e) => {
                    state.casing = e.target.value;
                    renderPreview();
                });

                byId("nameFormulaAdd").addEventListener("click", () =>
                    appendPendingSlotToFormula("name"),
                );
                byId("usernameFormulaAdd").addEventListener("click", () =>
                    appendPendingSlotToFormula("username"),
                );
            }

            function init() {
                state.slots = [
                    makeSlot("ssa-common-given", 0),
                    makeSlot("census-common-surnames", 1),
                    makeSlot("generated-number-slot", 2),
                ];

                byId("nameFormulaInput").value = state.nameFormula;
                byId("usernameFormulaInput").value = state.usernameFormula;
                byId("separatorInput").value = state.separator;
                byId("caseSelect").value = state.casing;

                byId("generateBtn").addEventListener("click", generate);

                byId("refreshUsernameBtn").addEventListener("click", () => {
                    const nameSegs = getFormulaSegments(
                        state.nameFormula,
                        state.slots.length,
                    ).filter((s) =>
                        isStandaloneSlotReference(s, state.slots.length),
                    );
                    const userSegs = getFormulaSegments(
                        state.usernameFormula,
                        state.slots.length,
                    ).filter((s) =>
                        isStandaloneSlotReference(s, state.slots.length),
                    );
                    const exclusiveSegs = userSegs.filter(
                        (s) => !nameSegs.includes(s),
                    );

                    const reroll = (index) => {
                        if (!state.slots[index]) return;
                        const prevText = state.tokens[index]
                            ? state.tokens[index].text
                            : null;
                        const combos = getSlotComboCount(state.slots[index]);
                        if (combos <= 1) return; // Prevent endless loop if only 1 option available

                        let newToken;
                        let attempts = 0;
                        do {
                            newToken = computeSingleToken(state.slots[index]);
                            attempts++;
                        } while (
                            newToken &&
                            prevText &&
                            newToken.text === prevText &&
                            attempts < 10
                        );
                        state.tokens[index] = newToken;
                    };

                    if (exclusiveSegs.length > 0) {
                        exclusiveSegs.forEach((seg) => reroll(Number(seg) - 1));
                    } else {
                        userSegs.forEach((seg) => reroll(Number(seg) - 1));
                    }
                    renderPreview();
                });

                byId("addSlotBtn").addEventListener("click", () => addSlot(""));
                byId("resultName").addEventListener("click", () =>
                    copyText(byId("resultName").dataset.copy, "name"),
                );
                byId("resultUsername").addEventListener("click", () =>
                    copyText(byId("resultUsername").dataset.copy, "username"),
                );

                bindAdvanced();
                clearFormulaAddOptions();
                renderDatasetInfo();
                renderSlots();
                generate();
            }

            init();
        </script>
    </body>
</html>
